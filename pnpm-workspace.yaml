packages:
  - examples
  - packages/@repo/*
  - packages/*
  - apps/*
  - '@repo/package.config'

onlyBuiltDependencies:
  - esbuild

minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - '@portabletext/*'
  - '@sanity/*'
  - '@types/*'
  - 'groq-js'
  - 'groq'
  - 'lodash-es'
  - 'react-rx'
  - 'sanity'
  - 'use-effect-event'
  - 'dotenv'
  - 'oxfmt'
  - '@oxfmt/*'

catalog:
  '@playwright/test': '^1.60.0'
  '@sanity/browserslist-config': '^1.0.5'
  '@sanity/client': '^7.22.0'
