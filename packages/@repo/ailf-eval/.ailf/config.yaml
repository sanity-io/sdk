# .ailf/config.yaml — AI Literacy Framework project configuration.
#
# This is the only config file `ailf run` reads (auto-loaded from
# <cwd>/.ailf/config.yaml). Run from this package dir so AILF finds it.

# Which Sanity project/dataset holds the docs under test.
source:
  projectId: '3do82whm'
  dataset: next
  baseUrl: https://www.sanity.io/docs

# Load tasks from THIS repo's .ailf/tasks/ (sdk-list-documents.task.ts)
# instead of the bundled corpus shipped inside @sanity/ailf
# (content-lake, groq, studio-setup, …). Without this, local runs
# evaluate the bundled tasks and never see your task.
taskSource:
  type: repo

triggers:
  pr:
    mode: validate-only
  pr-task-change:
    mode: eval
    paths:
      - packages/@repo/ailf-eval/.ailf/**
  main:
    mode: eval
    blocking: false
    notify: true
