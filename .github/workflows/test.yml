name: Test

on:
  # Build on pushes to branches that have a PR (including drafts)
  pull_request:
  # Build on pushes to the main branch
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    strategy:
      matrix:
        node-version: [22, 24]
      fail-fast: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node-version }}

      - name: Test
        run: |
          ARGS="--test-timeout=60000"
          if [ "${{ matrix.node-version }}" == "22" ]; then
            ARGS="$ARGS --retry 4 --coverage --reporter=default --reporter=blob"
          else
            ARGS="$ARGS --retry 1"
          fi
          pnpm test $ARGS

      - name: Upload blob report to GitHub Actions Artifacts
        if: ${{ !cancelled() && matrix.node-version == 22 }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: blob-report-${{ github.run_id }}-${{ matrix.node-version }}
          path: ".vitest-reports/*"
          include-hidden-files: true
          retention-days: 1

  report-coverage:
    if: ${{ !cancelled() }}
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          node-version: 22

      - name: "Download coverage artifacts"
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: .vitest-reports
          pattern: blob-report-${{ github.run_id }}-*
          merge-multiple: true

      - name: Merged report
        run: |
          pnpm vitest run --merge-reports --coverage

      - name: Report coverage
        uses: davelosert/vitest-coverage-report-action@8ab049ff5a2c6e78f78af446329379b318544a1a # v2
